<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPLACE_WITH_TITLE</title>
<style>
  :root {
    --bg: #fff; --fg: #1a1a2e; --accent: #2563eb; --border: #e2e8f0;
    --code-bg: #f1f5f9; --muted: #64748b;
    --good-bg: #d1fae5; --good-fg: #065f46;
    --bad-bg: #fee2e2; --bad-fg: #991b1b;
    --warn-bg: #fef3c7; --warn-fg: #92400e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; color: var(--fg); background: var(--bg); line-height: 1.8; max-width: 1200px; margin: 0 auto; padding: 3rem 2.5rem; font-size: 22px; }
  h1 { font-size: 2.6rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.7rem; margin: 1.6rem 0 1.2rem; }
  h2 { font-size: 1.8rem; margin: 2.5rem 0 1rem; color: var(--accent); }
  h3 { font-size: 1.4rem; margin: 1.4rem 0 0.6rem; }
  p, ul, ol { margin: 0.6rem 0; }
  ul, ol { padding-left: 1.8rem; }
  li { margin: 0.2rem 0; }
  code { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 1em; background: var(--code-bg); padding: 0.1em 0.3em; border-radius: 3px; }
  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.4rem; overflow-x: auto; font-size: 1.06rem; line-height: 1.7; position: relative; }
  pre code { background: none; padding: 0; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { border: 1px solid var(--border); padding: 0.6rem 0.9rem; text-align: left; font-size: 1.06rem; }
  th { background: var(--code-bg); font-weight: 600; }
  tr:nth-child(even) { background: #f8fafc; }
  .meta { color: var(--muted); font-size: 1.05rem; margin-bottom: 1rem; }

  /* ===== Tags ===== */
  .tag { display: inline-block; padding: 0.15em 0.5em; border-radius: 4px; font-size: 0.95rem; font-weight: 500; }
  .tag-add { background: #dbeafe; color: #1e40af; }
  .tag-del { background: var(--bad-bg); color: var(--bad-fg); }
  .tag-mod { background: var(--warn-bg); color: var(--warn-fg); }
  .tag-keep { background: var(--good-bg); color: var(--good-fg); }
  .tag-ok  { background: var(--good-bg); color: var(--good-fg); }
  .tag-warn { background: var(--warn-bg); color: var(--warn-fg); }
  .tag-bad { background: var(--bad-bg); color: var(--bad-fg); }

  /* ===== Code Diff Highlighting ===== */
  .hl-add { color: var(--good-fg); background: #d1fae5; display: inline-block; width: 100%; padding: 0 0.4rem; margin: 0 -0.4rem; }
  .hl-del { color: var(--bad-fg); background: #fee2e2; display: inline-block; width: 100%; padding: 0 0.4rem; margin: 0 -0.4rem; text-decoration: line-through; }

  /* ===== Copy Button ===== */
  .copy-wrap { position: relative; margin: 1rem 0; }
  .copy-btn { position: absolute; top: 8px; right: 10px; padding: 4px 14px; font-size: 0.88rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; opacity: 0.85; z-index: 1; }
  .copy-btn:hover { opacity: 1; }
  .copy-btn.copied { background: var(--good-fg); }

  /* ===== Callout Boxes ===== */
  .info { background: #dbeafe; border: 1px solid #93c5fd; border-radius: 6px; padding: 0.8rem 1.2rem; margin: 1rem 0; font-size: 1.05rem; }
  .warning { background: var(--warn-bg); border: 1px solid #fcd34d; border-radius: 6px; padding: 0.8rem 1.2rem; margin: 1rem 0; font-size: 1.05rem; }

  /* ===== TOC ===== */
  .toc { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.25rem; margin: 1rem 0; }
  .toc a { color: var(--accent); text-decoration: none; }
  .toc a:hover { text-decoration: underline; }

  @media print { body { max-width: none; padding: 1rem; } }
</style>
</head>
<body>

<h1>REPLACE_WITH_TITLE</h1>
<p class="meta">REPLACE_WITH_DATE &nbsp;|&nbsp; REPLACE_WITH_CONTEXT</p>

<!-- ==== 概览表格 ==== -->
<h2>概览</h2>
<table>
  <tr><th width="80">操作</th><th>文件</th><th>说明</th></tr>
  <!-- REPLACE_WITH_FILE_ROWS -->
</table>

<!-- ==== 正文内容 ==== -->
REPLACE_WITH_CONTENT

<script>
// 一键复制代码块内容
function copyCode(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  });
}
</script>

</body>
</html>
